<script>
(async()=>{
  const status=document.getElementById('status');
  try{
    const b64=document.getElementById('payload').textContent.replace(/\s+/g,'');
    const bin=atob(b64);
    const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
    let html;
    if('DecompressionStream' in window){
      const ds=new DecompressionStream('gzip');
      const stream=new Blob([bytes]).stream().pipeThrough(ds);
      html=await new Response(stream).text();
    }else{
      throw new Error('This browser cannot decompress the presentation package.');
    }
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    status.textContent='Could not load presentation: '+err.message;
  }
})();
</script>
