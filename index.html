<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bordered Teacher-Mothers · ACWS 2026 · Zhuo Chang</title>
<style>
html,body{height:100%;margin:0;background:#f4eee2;color:#1f1b16;font:16px Avenir,system-ui,sans-serif;display:grid;place-items:center}.status{max-width:680px;text-align:center;line-height:1.5;padding:24px}.status b{font-family:Georgia,serif;font-size:30px;font-weight:400;display:block;margin-bottom:12px}.status span{color:#5f5349}a{color:#7b1620}
</style>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
</head>
<body>
<div class="status"><b>Bordered Teacher-Mothers</b><span id="status">Loading presentation...</span></div>
<script>
(async()=>{
  const status=document.getElementById('status');
  const sources=[
    'https://cdn.jsdelivr.net/gh/changzhuo0200/Bordered-Teacher-Mothers@545e7ef6a54df62da086184f88fba54f52d2b98b/index.html',
    'https://raw.githubusercontent.com/changzhuo0200/Bordered-Teacher-Mothers/545e7ef6a54df62da086184f88fba54f52d2b98b/index.html'
  ];
  async function fetchSource(){
    let lastErr;
    for(const url of sources){
      try{
        const res=await fetch(url,{cache:'no-store'});
        if(!res.ok) throw new Error('HTTP '+res.status);
        return await res.text();
      }catch(err){ lastErr=err; }
    }
    throw lastErr || new Error('Could not fetch presentation package.');
  }
  try{
    status.textContent='Loading presentation package...';
    const packed=await fetchSource();
    const block=(packed.match(/const payload=\[([\s\S]*?)\]\s*\.join\(''\);/)||[])[1];
    if(!block) throw new Error('Presentation package not found.');
    const chunks=[...block.matchAll(/'([^']*)'/g)].map(m=>m[1]);
    const clean=chunks.join('').replace(/[^A-Za-z0-9+/=]/g,'');
    const binary=atob(clean);
    const bytes=Uint8Array.from(binary,c=>c.charCodeAt(0));
    let html;
    if(window.pako&&window.pako.ungzip){
      html=new TextDecoder('utf-8').decode(window.pako.ungzip(bytes));
    }else{
      if(!('DecompressionStream' in window)) throw new Error('This browser cannot decompress the presentation package.');
      const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      html=await new Response(stream).text();
    }
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    status.innerHTML='Could not load presentation: '+err.message+'<br><br><a href="https://cdn.jsdelivr.net/gh/changzhuo0200/Bordered-Teacher-Mothers@545e7ef6a54df62da086184f88fba54f52d2b98b/index.html">Open fallback package</a>';
    console.error(err);
  }
})();
</script>
</body>
</html>
