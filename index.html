    const clean=payload.replace(/[^A-Za-z0-9+/=]/g,'');
    const binary=atob(clean);
    const bytes=Uint8Array.from(binary, c=>c.charCodeAt(0));
    if(!('DecompressionStream' in window)) throw new Error('This browser cannot decompress the presentation package. Please use current Chrome, Safari, Edge, or Firefox.');
    const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    const html=await new Response(stream).text();
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    status.textContent='Could not load presentation: '+err.message;
    console.error(err);
  }
})();
</script>
</body>
</html>
